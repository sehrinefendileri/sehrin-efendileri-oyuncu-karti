<style>
/* RANK TEMALARI (Dinamik Border ve Glow) */
.theme-acemi { border-color: #64748b !important; box-shadow: 0 0 20px rgba(100, 116, 139, 0.2) !important; }
.theme-yetenekli { border-color: #38bdf8 !important; box-shadow: 0 0 30px rgba(56, 189, 248, 0.3) !important; }
.theme-usta { border-color: #facc15 !important; box-shadow: 0 0 40px rgba(250, 204, 21, 0.4) !important; }
.theme-efsane { border-color: #ef4444 !important; box-shadow: 0 0 50px rgba(239, 68, 68, 0.5) !important; animation: efsaneGlow 2s infinite alternate; }

@keyframes efsaneGlow {
    from { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
    to { box-shadow: 0 0 60px rgba(239, 68, 68, 0.7); }
}

/* Sayı Animasyonu Hazırlığı */
.stat-value { transition: all 0.5s ease; }

/* 6. Watermark (Server Adı Artık Kartın Parçası) */
.card-watermark {
    position: absolute;
    bottom: 15px;
    right: 20px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.3;
    color: #fff;
}
</style>

<script>
// Sayı Sayma Animasyonu (Count-Up)
function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}

// fetchPlayerStats fonksiyonu içinde rank atama kısmına ekle:
function updateCardTheme(kd) {
    el.card.classList.remove('theme-acemi', 'theme-yetenekli', 'theme-usta', 'theme-efsane');
    if(kd >= 2.5) el.card.classList.add('theme-efsane');
    else if(kd >= 1.8) el.card.classList.add('theme-usta');
    else if(kd >= 1.2) el.card.classList.add('theme-yetenekli');
    else el.card.classList.add('theme-acemi');
}
</script>
