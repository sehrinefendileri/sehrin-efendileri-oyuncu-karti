<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şehrin Efendileri - Oyuncu Kartı</title>

<!-- Sosyal Medya Önizleme (OG Tags) -->
<meta property="og:title" content="Şehrin Efendileri - Oyuncu Kartı">
<meta property="og:description" content="Senin istatistiklerin sunucunun efendisi olmaya yetecek mi? Hemen sorgula ve meydan oku!">
<meta property="og:image" content="banner.jpg">
<meta property="og:type" content="website">

<!-- Harici Kütüphaneler -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* DİKEY DARALTMA & PREMİUM GÖRÜNÜM */
body { 
    background: url("banner.jpg") no-repeat center center fixed;
    background-size: cover; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center;
    padding: 5px; min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center;
}
body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 0; }
.content-wrap { position: relative; z-index: 10; width: 100%; max-width: 400px; }

h1 { color: rgba(250, 204, 21, 0.5); margin: 10px 0; text-transform: uppercase; letter-spacing: 3px; font-size: 16px; }

/* Arama Alanı */
.search-box { margin-bottom: 15px; display: flex; justify-content: center; }
#nick-input { padding: 10px; border-radius: 8px 0 0 8px; border: 1px solid #38bdf8; width: 150px; background: #111; color: #fff; outline: none; }
#search-btn { padding: 10px 15px; cursor: pointer; background: #facc15; border: none; border-radius: 0 8px 8px 0; font-weight: 800; color: #000; }

/* KART TASARIMI */
#card-wrapper { display: none; flex-direction: column; align-items: center; margin-bottom: 15px; }
#player-card { background: linear-gradient(160deg, #111, #050505); border: 2px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 25px; width: 330px; text-align: left; position: relative; }

/* RANK TEMALARI */
.theme-acemi { border-color: #475569 !important; }
.theme-yetenekli { border-color: #38bdf8 !important; }
.theme-usta { border-color: #facc15 !important; }
.theme-efsane { border-color: #ef4444 !important; animation: glow 2s infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); } to { box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); } }

#card-nick { text-align: center; color: #fff; font-size: 26px; font-weight: 900; margin: 0; text-shadow: 0 0 15px rgba(56,189,248,0.3); }
.card-server-info { text-align: center; color: #facc15; font-size: 10px; font-weight: 800; margin: 5px 0 10px 0; letter-spacing: 1px; }
#card-rank { text-align: center; font-size: 18px; font-weight: 900; margin: 0; letter-spacing: 2px; }
#card-brag { text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 15px; font-style: italic; }

.kd-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; margin-bottom: 15px; text-align: center; }
#card-kd { font-size: 42px; font-weight: 950; display: block; line-height: 1; }

.stat-row { display: flex; justify-content: space-between; margin: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 4px; font-size: 14px; }
.stat-row b { color: #64748b; font-size: 10px; text-transform: uppercase; }

.badge-box { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; min-height: 18px; }
.badge { font-size: 8px; padding: 2px 8px; border-radius: 4px; background: rgba(56,189,248,0.1); color: #38bdf8; font-weight: 900; border: 1px solid rgba(56,189,248,0.2); }

/* AKSİYON ALANI */
.challenge-text { color: #facc15; font-size: 11px; font-weight: 800; margin: 8px 0; font-style: italic; }
.action-buttons { display: flex; gap: 8px; width: 330px; }
.download-btn { flex: 1.5; background: #38bdf8; color: #fff; padding: 12px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
.share-btn { flex: 1; background: #22c55e; color: #fff; padding: 12px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
</style>
</head>

<body>
<div class="content-wrap">
    <h1>OYUNCU KARTI SORGULA</h1>
    <div class="search-box">
        <input id="nick-input" placeholder="Nick yazınız...">
        <button id="search-btn" onclick="fetchPlayerStats()">Sorgula</button>
    </div>

    <div id="error-message" style="color: #ef4444; display: none; font-weight: bold; margin-bottom: 10px;"></div>

    <div id="card-wrapper">
        <div id="player-card">
            <div id="badge-box" class="badge-box"></div>
            <h2 id="card-nick"></h2>
            <div class="card-server-info">SEHRİN EFENDİLERİ | 95.173.173.81</div>
            <div id="card-rank"></div>
            <div id="card-brag"></div>
            <div class="kd-box">
                <span style="font-size: 9px; color: #64748b; letter-spacing: 1px;">K/D PERFORMANSI</span>
                <span id="card-kd">0.00</span>
            </div>
            <div class="stat-row"><b>ÖLDÜRME</b> <span id="card-kills">0</span></div>
            <div class="stat-row"><b>ÖLÜM</b> <span id="card-deaths">0</span></div>
            <div class="stat-row"><b>HS ORANI</b> <span id="card-hs">%0</span></div>
            <div class="stat-row"><b>TOPLAM HASAR</b> <span id="card-dmg">0</span></div>
        </div>
        <div class="challenge-text">"Beni geçebilecek var mı? Paylaş ve meydan oku!"</div>
        <div class="action-buttons">
            <button class="download-btn" onclick="downloadCard()">KARTI KAYDET</button>
            <button class="share-btn" onclick="copyShareLink()">LİNKİ PAYLAŞ</button>
        </div>
    </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://ksevvntxdkuexulklmph.supabase.co",
    "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL"
);

// BAŞLANGIÇ: URL'de nick varsa otomatik sorgula
document.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const nickParam = urlParams.get('nick');
    if (nickParam) {
        document.getElementById('nick-input').value = nickParam;
        fetchPlayerStats(nickParam);
    }
});

function animateValue(obj, start, end, duration, isFloat = false) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        let val = progress * (end - start) + start;
        obj.innerHTML = isFloat ? val.toFixed(2) : Math.floor(val).toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
}

let isLoading = false;
async function fetchPlayerStats(overrideNick = null){
    const input = overrideNick || document.getElementById('nick-input').value.trim();
    if(!input || isLoading) return;

    isLoading = true;
    const btn = document.getElementById('search-btn');
    btn.innerText = "...";
    document.getElementById('error-message').style.display = "none";
    document.getElementById('card-wrapper').style.display = "none";

    try {
        const { data, error } = await supabaseClient.rpc('search_player',{search_input:input});
        if(error || !data || data.length === 0) {
            document.getElementById('error-message').innerText = "Oyuncu bulunamadı!";
            document.getElementById('error-message').style.display = "block";
            return;
        }

        const p = data[0];
        const kills = Number(p.total_kills) || 0;
        const deaths = Number(p.total_deaths) || 1;
        const kdVal = (kills/deaths);
        
        document.getElementById('card-nick').innerText = p.nick;
        
        // TEMA VE RANK MANTIĞI
        const card = document.getElementById('player-card');
        card.className = ''; 
        const rankEl = document.getElementById('card-rank');
        const bragEl = document.getElementById('card-brag');

        if(kdVal >= 2.5) { rankEl.innerText = "EFSANE"; bragEl.innerText = "Oyuna yön veriyor."; card.classList.add('theme-efsane'); }
        else if(kdVal >= 1.8) { rankEl.innerText = "USTA"; bragEl.innerText = "Kontrolü elinde tutuyor."; card.classList.add('theme-usta'); }
        else if(kdVal >= 1.2) { rankEl.innerText = "YETENEKLİ"; bragEl.innerText = "Dengeli performans."; card.classList.add('theme-yetenekli'); }
        else { rankEl.innerText = "ACEMİ"; bragEl.innerText = "Başlangıç seviyesinde."; card.classList.add('theme-acemi'); }

        // ROZETLER
        let badges = [];
        if((p.hs_percent||0) >= 35) badges.push("HS MAKİNESİ");
        if(kdVal >= 2.0) badges.push("DURDURULAMAZ");
        if((p.total_damage||0) > 1000000) badges.push("BOMBARDIRMAN");
        document.getElementById('badge-box').innerHTML = badges.map(b => `<span class="badge">${b}</span>`).join('');

        document.getElementById('card-wrapper').style.display = "flex";

        // SAYI ANİMASYONLARI
        setTimeout(() => {
            animateValue(document.getElementById('card-kd'), 0, kdVal, 1000, true);
            animateValue(document.getElementById('card-kills'), 0, kills, 1000);
            animateValue(document.getElementById('card-deaths'), 0, deaths, 1000);
            animateValue(document.getElementById('card-dmg'), 0, Number(p.total_damage||0), 1000);
            document.getElementById('card-hs').innerText = "%" + (p.hs_percent || 0);
        }, 100);

    } catch(err) { console.log(err); }
    finally { isLoading = false; btn.innerText = "Sorgula"; }
}

function copyShareLink() {
    const nick = document.getElementById('card-nick').innerText;
    const shareUrl = window.location.origin + window.location.pathname + "?nick=" + encodeURIComponent(nick);
    navigator.clipboard.writeText(shareUrl).then(() => {
        alert("Link kopyalandı! Bu linki açan doğrudan senin kartını görecek.");
    });
}

function downloadCard(){
    const card = document.getElementById('player-card');
    html2canvas(card,{backgroundColor:null,scale:3,useCORS:true}).then(canvas => {
        const link = document.createElement('a');
        link.download = `${document.getElementById('card-nick').innerText}_Stats.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}
</script>
</body>
</html>
