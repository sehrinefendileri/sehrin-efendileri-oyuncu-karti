<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri - Oyuncu Kartı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Kurumsal Arka Plan ve Genel Stil */
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("banner.jpg") center/cover no-repeat fixed;
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            margin: 0;
        }

        h1 { 
            color: #facc15; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Giriş Alanları */
        #nick-input { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            width: 250px; 
            background: rgba(45, 45, 45, 0.8); 
            color: white; 
            outline: none;
        }
        #nick-input:focus { border-color: #38bdf8; }

        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            background: #facc15; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-left: 10px; 
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(250, 204, 21, 0.4); }

        #error-message { color: #ef4444; margin: 15px; display: none; font-weight: bold; }

        /* Modern Oyuncu Kartı Tasarımı (Cam Efekti) */
        #card-wrapper { display: none; flex-direction: column; align-items: center; margin-top: 40px; }
        
        #player-card { 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.4); 
            padding: 35px; 
            border-radius: 20px; 
            width: 320px; 
            text-align: left; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* Kartın üstündeki ince mavi çizgi */
        #player-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #38bdf8;
        }

        #card-nick { 
            text-align: center; 
            color: #38bdf8; 
            font-size: 24px; 
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-size: 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        .stat-row b { color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 12px; align-self: center; }
        .stat-row span { color: #f8fafc; font-weight: bold; font-size: 18px; }

        /* K/D için özel vurgu */
        .kd-row { background: rgba(56, 189, 248, 0.1); padding: 10px; border-radius: 8px; border: none; }
        .kd-row span { color: #facc15; font-size: 24px; }

        .download-btn { margin-top: 25px; background: #38bdf8; color: white; width: 320px; margin-left: 0; }
        .download-btn:hover { background: #0284c7; }
    </style>
</head>
<body>

    <h1>OYUNCU KARTI OLUŞTUR</h1>
    
    <input type="text" id="nick-input" placeholder="Oyuncu Nickini Girin...">
    <button onclick="fetchPlayerStats()">Sorgula</button>
    
    <div id="error-message"></div>

    <div id="card-wrapper">
        <div id="player-card">
            <h2 id="card-nick"></h2>
            <div style="text-align: center; font-size: 10px; color: #64748b; margin-bottom: 20px; letter-spacing: 2px;">SEHRIN EFENDILERI | 95.173.173.81</div>
            
            <div class="stat-row kd-row"><b>K/D ORANI</b> <span id="card-kd"></span></div>
            <div class="stat-row"><b>ÖLDÜRME</b> <span id="card-kills"></span></div>
            <div class="stat-row"><b>ÖLME</b> <span id="card-deaths"></span></div>
            <div class="stat-row"><b>HS ORANI</b> <span id="card-hs"></span></div>
            <div class="stat-row"><b>HASAR</b> <span id="card-dmg"></span></div>
        </div>
        <button class="download-btn" onclick="downloadCard()">KARTI İNDİR (PNG)</button>
    </div>

    <script>
        const _URL = "https://ksevvntxdkuexulklmph.supabase.co";
        const _KEY = "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL";
        const supabaseClient = window.supabase.createClient(_URL, _KEY);

        const el = {
            input: document.getElementById('nick-input'),
            error: document.getElementById('error-message'),
            wrapper: document.getElementById('card-wrapper'),
            card: document.getElementById('player-card'),
            nick: document.getElementById('card-nick'),
            kd: document.getElementById('card-kd'),
            kills: document.getElementById('card-kills'),
            deaths: document.getElementById('card-deaths'),
            hs: document.getElementById('card-hs'),
            dmg: document.getElementById('card-dmg')
        };

        async function fetchPlayerStats() {
            const input = el.input.value.trim();
            if (!input) { alert("Nick girin!"); return; }
            
            el.error.style.display = "none";
            el.wrapper.style.display = "none";

            try {
                const { data, error } = await supabaseClient.rpc('search_player', { search_input: input });
                
                if (error || !data || data.length === 0) {
                    el.error.innerText = "Oyuncu bulunamadı!";
                    el.error.style.display = "block";
                    return;
                }

                const p = data[0];
                el.nick.innerText = p.nick;
                el.kd.innerText = (p.total_kills / (p.total_deaths || 1)).toFixed(2);
                el.kills.innerText = p.total_kills;
                el.deaths.innerText = p.total_deaths;
                el.hs.innerText = `%${p.hs_percent}`;
                el.dmg.innerText = p.total_damage.toLocaleString();
                
                el.wrapper.style.display = "flex";
            } catch (e) {
                console.error(e);
                el.error.innerText = "Sunucu hatası!";
                el.error.style.display = "block";
            }
        }

        function downloadCard() {
            // scale: 3 daha yüksek kalite sağlar
            html2canvas(el.card, { backgroundColor: null, scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${el.nick.innerText}_SehrinEfendileri_Kart.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
