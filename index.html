<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri - Oyuncu Kartı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 1. ARKA PLAN VE OVERLAY GÜNCELLEMESİ */
        body { 
            background: url("banner.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Görsel gürültüyü azaltan overlay katmanı */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        /* Tüm içeriği üstte tutmak için wrap */
        .content-wrap { position: relative; z-index: 10; width: 100%; max-width: 500px; }

        h1 { 
            color: #facc15; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 2. INPUT UI İYİLEŞTİRMESİ */
        #nick-input { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: 1px solid #38bdf8; 
            width: 250px; 
            background: rgba(15, 15, 15, 0.9); 
            color: white; 
            outline: none;
            transition: 0.2s;
        }
        #nick-input:focus { 
            border-color: #facc15; 
            box-shadow: 0 0 10px rgba(250,204,21,.3);
        }

        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            background: #facc15; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-left: 10px; 
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(250, 204, 21, 0.4); }

        #error-message { color: #ef4444; margin: 15px; display: none; font-weight: bold; }

        /* 3. CAM EFEKTİ VE SPACING GÜNCELLEMESİ */
        #card-wrapper { display: none; flex-direction: column; align-items: center; margin-top: 60px; }
        
        #player-card { 
            background: rgba(31, 31, 31, 0.75); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.4); 
            padding: 35px; 
            border-radius: 20px; 
            width: 340px; 
            text-align: left; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        #player-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: #38bdf8;
        }

        #card-nick { 
            text-align: center; 
            color: #38bdf8; 
            font-size: 24px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
        }

        /* 7. MİKRO DETAY (OPACITY VE LETTER SPACING) */
        .card-subtext { 
            text-align: center; 
            font-size: 10px; 
            color: #ffffff; 
            opacity: 0.7; 
            margin-bottom: 25px; 
            letter-spacing: 1px; 
            font-weight: 600;
        }

        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-size: 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 8px;
        }
        .stat-row b { color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 12px; align-self: center; }
        .stat-row span { color: #f8fafc; font-weight: bold; font-size: 18px; }

        /* 4. K/D ÖZEL VURGU VE DİNAMİK RENK */
        .kd-row { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }
        #card-kd { font-size: 28px; }

        /* 5. BUTON GLOW VE HİYERARŞİ */
        .download-btn { 
            margin-top: 30px; 
            background: #38bdf8; 
            color: white; 
            width: 340px; 
            margin-left: 0; 
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .download-btn:hover { 
            background: #0ea5e9; 
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

<div class="content-wrap">
    <h1>OYUNCU KARTI OLUŞTUR</h1>
    
    <div style="position: relative; z-index: 20;">
        <input type="text" id="nick-input" placeholder="Oyuncu Nickini Girin...">
        <button onclick="fetchPlayerStats()">Sorgula</button>
    </div>
    
    <div id="error-message"></div>

    <div id="card-wrapper">
        <div id="player-card">
            <h2 id="card-nick"></h2>
            <div class="card-subtext">SEHRIN EFENDILERI | 95.173.173.81</div>
            
            <div class="stat-row kd-row"><b>K/D ORANI</b> <span id="card-kd"></span></div>
            <div class="stat-row"><b>ÖLDÜRME</b> <span id="card-kills"></span></div>
            <div class="stat-row"><b>ÖLME</b> <span id="card-deaths"></span></div>
            <div class="stat-row"><b>HS ORANI</b> <span id="card-hs"></span></div>
            <div class="stat-row"><b>HASAR</b> <span id="card-dmg"></span></div>
        </div>
        <button class="download-btn" onclick="downloadCard()">KARTI İNDİR (PNG)</button>
    </div>
</div>

    <script>
        const _URL = "https://ksevvntxdkuexulklmph.supabase.co";
        const _KEY = "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL";
        const supabaseClient = window.supabase.createClient(_URL, _KEY);

        const el = {
            input: document.getElementById('nick-input'),
            error: document.getElementById('error-message'),
            wrapper: document.getElementById('card-wrapper'),
            card: document.getElementById('player-card'),
            nick: document.getElementById('card-nick'),
            kd: document.getElementById('card-kd'),
            kills: document.getElementById('card-kills'),
            deaths: document.getElementById('card-deaths'),
            hs: document.getElementById('card-hs'),
            dmg: document.getElementById('card-dmg')
        };

        async function fetchPlayerStats() {
            const input = el.input.value.trim();
            if (!input) { alert("Nick girin!"); return; }
            
            el.error.style.display = "none";
            el.wrapper.style.display = "none";

            try {
                const { data, error } = await supabaseClient.rpc('search_player', { search_input: input });
                
                if (error || !data || data.length === 0) {
                    el.error.innerText = "Oyuncu bulunamadı!";
                    el.error.style.display = "block";
                    return;
                }

                const p = data[0];
                const kdVal = (p.total_kills / (p.total_deaths || 1)).toFixed(2);
                
                el.nick.innerText = p.nick;
                el.kd.innerText = kdVal;

                // 4. DİNAMİK RENK MANTIĞI UYGULAMASI
                if (parseFloat(kdVal) >= 1.5) el.kd.style.color = "#22c55e"; // Yeşil (Efsane)
                else if (parseFloat(kdVal) >= 1.0) el.kd.style.color = "#facc15"; // Sarı (Orta/İyi)
                else el.kd.style.color = "#ef4444"; // Kırmızı (Zayıf)

                el.kills.innerText = p.total_kills;
                el.deaths.innerText = p.total_deaths;
                el.hs.innerText = `%${p.hs_percent}`;
                el.dmg.innerText = p.total_damage.toLocaleString();
                
                el.wrapper.style.display = "flex";
            } catch (e) {
                console.error(e);
                el.error.innerText = "Sunucu hatası!";
                el.error.style.display = "block";
            }
        }

        function downloadCard() {
            html2canvas(el.card, { backgroundColor: null, scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${el.nick.innerText}_Stats.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
