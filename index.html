<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şehrin Efendileri - Oyuncu Kartı</title>

<!-- Harici Kütüphaneler -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* 1 & 2. ODAK VE DERİNLİK */
body { 
    background: url("banner.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #ffffff; 
    font-family: 'Segoe UI', Roboto, sans-serif; 
    text-align: center; 
    padding: 10px;
    min-height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85); 
    backdrop-filter: blur(10px); 
    z-index: 0;
}

.content-wrap { position: relative; z-index: 10; width: 100%; max-width: 450px; }

h1 { 
    color: #facc15; 
    margin: 20px 0;
    text-transform: uppercase; 
    letter-spacing: 4px;
    font-size: 20px;
}

/* Arama Alanı */
.search-box {
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
}

#nick-input { 
    padding: 12px; 
    border-radius: 8px 0 0 8px; 
    border: 1px solid rgba(56, 189, 248, 0.4); 
    width: 180px; 
    background: rgba(15, 15, 15, 0.9); 
    color: white; 
    outline: none;
    font-size: 14px;
}

#search-btn { 
    padding: 12px 20px; 
    cursor: pointer; 
    background: #facc15; 
    border: none; 
    border-radius: 0 8px 8px 0; 
    font-weight: 800; 
    color: #000;
    transition: 0.3s;
}

/* RANK TEMALARI */
.theme-acemi { border-color: #475569 !important; }
.theme-yetenekli { border-color: #38bdf8 !important; }
.theme-usta { border-color: #facc15 !important; }
.theme-efsane { border-color: #ef4444 !important; animation: glow 2s infinite alternate; }

@keyframes glow {
    from { box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
    to { box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }
}

#card-wrapper { display: none; flex-direction: column; align-items: center; }

#player-card { 
    background: linear-gradient(160deg, #151515, #0a0a0a); 
    border: 2px solid rgba(255, 255, 255, 0.1); 
    padding: 25px; 
    border-radius: 25px; 
    width: 340px; 
    text-align: left; 
    position: relative;
}

.badge-box { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; min-height: 18px; }
.badge { font-size: 8px; padding: 2px 8px; border-radius: 4px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; font-weight: 900; border: 1px solid rgba(56, 189, 248, 0.2); }

#card-nick { text-align: center; color: #fff; font-size: 28px; font-weight: 900; margin: 0; }

/* SUNUCU VE IP VURGUSU */
.card-server-info {
    text-align: center;
    color: #facc15; 
    font-size: 11px;
    font-weight: 800;
    margin: 5px 0 15px 0;
    letter-spacing: 1px;
}

#card-rank { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 2px; }
.card-brag { text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 15px; }

.kd-box { background: rgba(255, 255, 255, 0.03); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; }
.kd-label { font-size: 9px; color: #64748b; font-weight: 800; }
#card-kd { font-size: 40px; font-weight: 900; display: block; }

.stat-row { display: flex; justify-content: space-between; margin: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
.stat-row b { color: #94a3b8; font-size: 11px; }
.stat-row span { font-weight: 800; font-size: 16px; }

.download-btn { 
    margin-top: 15px; 
    background: #38bdf8;
    color: white; 
    width: 340px; 
    padding: 14px;
    font-weight: 900; 
    border: none;
    border-radius: 12px;
    cursor: pointer;
}
</style>
</head>

<body>
<div class="content-wrap">
    <h1>OYUNCU KARTI</h1>

    <div class="search-box">
        <input id="nick-input" placeholder="Nick yazınız..." onkeydown="if(event.key==='Enter')fetchPlayerStats()">
        <button id="search-btn" onclick="fetchPlayerStats()">Sorgula</button>
    </div>

    <div id="error-message" style="color: #ef4444; margin-bottom: 20px; display: none; font-weight: bold;"></div>

    <div id="card-wrapper">
        <div id="player-card">
            <div id="badge-box" class="badge-box"></div>
            <h2 id="card-nick"></h2>
            
            <!-- Canlı ve Belirgin Sunucu Bilgisi -->
            <div class="card-server-info">SEHRİN EFENDİLERİ | 95.173.173.81</div>
            
            <div id="card-rank"></div>
            <div class="card-brag" id="card-brag"></div>

            <div class="kd-box">
                <span class="kd-label">K/D ORANI</span>
                <span id="card-kd">0.00</span>
            </div>

            <div class="stat-row"><b>ÖLDÜRME</b> <span id="card-kills">0</span></div>
            <div class="stat-row"><b>ÖLÜM</b> <span id="card-deaths">0</span></div>
            <div class="stat-row"><b>HS YÜZDESİ</b> <span id="card-hs">%0</span></div>
            <div class="stat-row"><b>TOPLAM HASAR</b> <span id="card-dmg">0</span></div>
        </div>
        <button class="download-btn" onclick="downloadCard()">KARTI RESİM OLARAK KAYDET</button>
    </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://ksevvntxdkuexulklmph.supabase.co",
    "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL"
);

const el = {
    input: document.getElementById('nick-input'),
    btn: document.getElementById('search-btn'),
    error: document.getElementById('error-message'),
    wrapper: document.getElementById('card-wrapper'),
    card: document.getElementById('player-card'),
    nick: document.getElementById('card-nick'),
    kd: document.getElementById('card-kd'),
    kills: document.getElementById('card-kills'),
    deaths: document.getElementById('card-deaths'),
    hs: document.getElementById('card-hs'),
    dmg: document.getElementById('card-dmg'),
    rank: document.getElementById('card-rank'),
    brag: document.getElementById('card-brag'),
    badges: document.getElementById('badge-box')
};

function animateValue(obj, start, end, duration, isFloat = false) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        let val = progress * (end - start) + start;
        obj.innerHTML = isFloat ? val.toFixed(2) : Math.floor(val).toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
    };
    window.requestAnimationFrame(step);
}

function updateCardTheme(kd) {
    el.card.classList.remove('theme-acemi', 'theme-yetenekli', 'theme-usta', 'theme-efsane');
    if(kd >= 2.5) el.card.classList.add('theme-efsane');
    else if(kd >= 1.8) el.card.classList.add('theme-usta');
    else if(kd >= 1.2) el.card.classList.add('theme-yetenekli');
    else el.card.classList.add('theme-acemi');
}

function updateBadges(p, kd, hs) {
    let badges = [];
    if(hs >= 35) badges.push("HS MAKİNESİ");
    if(kd >= 2.0) badges.push("DURDURULAMAZ");
    if((Number(p.total_damage) || 0) > 1000000) badges.push("BOMBARDIRMAN");
    el.badges.innerHTML = badges.map(b => `<span class="badge">${b}</span>`).join('');
}

let isLoading = false;
async function fetchPlayerStats(){
    const input = el.input.value.trim();
    if(!input || input.length < 3 || isLoading) return;

    isLoading = true;
    el.btn.innerText = "...";
    el.error.style.display = "none";
    el.wrapper.style.display = "none";

    try {
        const { data, error } = await supabaseClient.rpc('search_player',{search_input:input});
        if(error || !data || data.length === 0){
            el.error.innerText = "Oyuncu bulunamadı!";
            el.error.style.display = "block";
            return;
        }

        const p = data[0];
        const kills = Number(p.total_kills) || 0;
        const deaths = Number(p.total_deaths) || 1;
        const kdVal = (kills/deaths);
        const hs = p.hs_percent || 0;

        el.nick.innerText = p.nick;
        updateCardTheme(kdVal);
        updateBadges(p, kdVal, hs);

        el.kd.style.color = kdVal >= 1.5 ? "#22c55e" : kdVal >= 1 ? "#facc15" : "#ef4444";

        // YENİ RÜTBE VE AÇIKLAMA TANIMLARI
        if(kdVal >= 2.5) { el.rank.innerText = "EFSANE"; el.brag.innerText = "Oyuna yön veriyor."; }
        else if(kdVal >= 1.8) { el.rank.innerText = "USTA"; el.brag.innerText = "Kontrolü elinde tutuyor."; }
        else if(kdVal >= 1.2) { el.rank.innerText = "YETENEKLİ"; el.brag.innerText = "Dengeli performans."; }
        else { el.rank.innerText = "ACEMİ"; el.brag.innerText = "Başlangıç seviyesinde."; }

        el.wrapper.style.display = "flex";

        setTimeout(() => {
            animateValue(el.kd, 0, kdVal, 1000, true);
            animateValue(el.kills, 0, kills, 1000);
            animateValue(el.deaths, 0, deaths, 1000);
            animateValue(el.dmg, 0, (Number(p.total_damage) || 0), 1000);
            el.hs.innerHTML = "%" + hs;
        }, 100);

    } catch(err) {
        el.error.innerText = "Hata oluştu.";
        el.error.style.display = "block";
    } finally {
        isLoading = false;
        el.btn.innerText = "Sorgula";
    }
}

function downloadCard(){
    html2canvas(el.card,{backgroundColor:null,scale:3,useCORS:true}).then(c=>{
        const a = document.createElement("a");
        a.href = c.toDataURL("image/png");
        a.download = `${el.nick.innerText}_Efendi_Kart.png`;
        a.click();
    });
}
</script>
</body>
</html>
