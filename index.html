<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehrin Efendileri - Oyuncu Kartı</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { 
            background: url("banner.jpg") no-repeat center center fixed;
            background-size: cover;
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .content-wrap { position: relative; z-index: 10; width: 100%; max-width: 500px; }

        h1 { 
            color: #facc15; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #nick-input { 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: 1px solid #38bdf8; 
            width: 250px; 
            background: rgba(15, 15, 15, 0.9); 
            color: white; 
            outline: none;
            transition: 0.2s;
        }
        #nick-input:focus { 
            border-color: #facc15; 
            box-shadow: 0 0 10px rgba(250,204,21,.3);
        }

        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            background: #facc15; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            margin-left: 10px; 
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(250, 204, 21, 0.4); }

        #error-message { color: #ef4444; margin: 15px; display: none; font-weight: bold; }

        #card-wrapper { display: none; flex-direction: column; align-items: center; margin-top: 60px; }
        
        #player-card { 
            background: rgba(31, 31, 31, 0.75); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.4); 
            padding: 35px; 
            border-radius: 20px; 
            width: 340px; 
            text-align: left; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        #card-nick { 
            text-align: center; 
            color: #38bdf8; 
            font-size: 30px;
            font-weight: 900;
        }

        .card-subtext { 
            text-align: center; 
            font-size: 11px; 
            opacity: 0.7; 
            margin-bottom: 10px;
        }

        .card-rank {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .card-brag {
            text-align: center;
            font-size: 14px;
            margin-bottom: 12px;
            color: #94a3b8;
        }

        .card-share {
            text-align: center;
            font-size: 13px;
            margin-bottom: 15px;
            color: #38bdf8;
            font-weight: 700;
        }

        .stat-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0;
        }

        .stat-row b { color: #94a3b8; font-size: 14px; }
        .stat-row span { font-weight: bold; font-size: 22px; }

        .kd-row { 
            background: rgba(255, 255, 255, 0.08); 
            padding: 15px; 
            border-radius: 10px;
        }

        #card-kd { font-size: 34px; }

        .download-btn { 
            margin-top: 30px; 
            background: #38bdf8; 
            color: white; 
            width: 340px; 
            font-weight: 800;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

<div class="content-wrap">
    <h1>OYUNCU KARTI OLUŞTUR</h1>
    
    <div>
        <input type="text" id="nick-input" placeholder="Oyuncu Nickini Girin..." onkeydown="if(event.key==='Enter')fetchPlayerStats()">
        <button onclick="fetchPlayerStats()">Sorgula</button>
    </div>
    
    <div id="error-message"></div>

    <div id="card-wrapper">
        <div id="player-card">
            <h2 id="card-nick"></h2>
            <div class="card-subtext">SEHRIN EFENDILERI | 95.173.173.81</div>

            <div id="card-rank" class="card-rank"></div>
            <div id="card-brag" class="card-brag"></div>
            <div class="card-share">PERFORMANSINI GÖSTER</div>

            <div class="stat-row kd-row"><b>K/D</b> <span id="card-kd"></span></div>
            <div class="stat-row"><b>ÖLDÜRME</b> <span id="card-kills"></span></div>
            <div class="stat-row"><b>ÖLÜM</b> <span id="card-deaths"></span></div>
            <div class="stat-row"><b>HS</b> <span id="card-hs"></span></div>
            <div class="stat-row"><b>HASAR</b> <span id="card-dmg"></span></div>
        </div>

        <button class="download-btn" onclick="downloadCard()">KARTI İNDİR</button>
    </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
    "https://ksevvntxdkuexulklmph.supabase.co",
    "sb_publishable_9iHDw5_WEWyNnCz_wXIMuA_VPt36UTL"
);

const el = {
    input: document.getElementById('nick-input'),
    error: document.getElementById('error-message'),
    wrapper: document.getElementById('card-wrapper'),
    card: document.getElementById('player-card'),
    nick: document.getElementById('card-nick'),
    kd: document.getElementById('card-kd'),
    kills: document.getElementById('card-kills'),
    deaths: document.getElementById('card-deaths'),
    hs: document.getElementById('card-hs'),
    dmg: document.getElementById('card-dmg'),
    rank: document.getElementById('card-rank'),
    brag: document.getElementById('card-brag')
};

async function fetchPlayerStats(){
    const input = el.input.value.trim();
    if(!input) return;

    el.error.style.display = "none";
    el.wrapper.style.display = "none";

    const { data } = await supabaseClient.rpc('search_player',{search_input:input});

    if(!data || data.length===0){
        el.error.innerText="Oyuncu bulunamadı!";
        el.error.style.display="block";
        return;
    }

    const p = data[0];
    const kd = (p.total_kills/(p.total_deaths||1)).toFixed(2);
    const kdNum = parseFloat(kd);
    const hs = p.hs_percent||0;

    el.nick.innerText=p.nick;
    el.kd.innerText=kd;

    if(kdNum>=2.5){el.rank.innerText="EFSANE";el.brag.innerText="Sunucunun zirvesinde";}
    else if(kdNum>=1.8){el.rank.innerText="USTA";el.brag.innerText="Rakiplerine üstün";}
    else if(kdNum>=1.2){el.rank.innerText="YETENEKLİ";el.brag.innerText="Etkili performans";}
    else if(kdNum>=0.8){el.rank.innerText="ORTA SEVİYE";el.brag.innerText="Dengeli oyun";}
    else{el.rank.innerText="ACEMİ";el.brag.innerText="Gelişmeye açık";}

    if(hs>=40) el.rank.innerText+=" • HS USTASI";
    else if(hs>=30) el.rank.innerText+=" • İSABETLİ";

    el.kd.style.color = kdNum>=1.5?"#22c55e":kdNum>=1?"#facc15":"#ef4444";

    el.kills.innerText=p.total_kills;
    el.deaths.innerText=p.total_deaths;
    el.hs.innerText="%"+hs;
    el.dmg.innerText=p.total_damage.toLocaleString();

    el.wrapper.style.display="flex";
}

function downloadCard(){
    html2canvas(el.card,{backgroundColor:null,scale:3}).then(c=>{
        const a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="player.png";
        a.click();
    });
}
</script>

</body>
</html>
